version: "3.9"
services:
  postgres:
    image: postgis/postgis:latest
    environment:
      POSTGRES_DB: "meetupDb"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    volumes:
      - pg_data:/var/lib/postgresql/data   # Persisting data
    ports:
      - "5433:5432"

volumes:
  pg_data:

networks:
  postgres_network:
    driver: bridge